name: MAPS CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '8.0.x'
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/${{ github.repository }}/maps-api
  IMAGE_WEB: ghcr.io/${{ github.repository }}/maps-web

jobs:
  # ─── BUILD & TEST ─────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore MAPS.sln

      - name: Build solution
        run: dotnet build MAPS.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test MAPS.sln --no-build --configuration Release --verbosity normal

  # ─── DOCKER BUILD & PUSH (only on main) ──────────────────────────────────
  docker-build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/MAPS.API/Dockerfile
          push: true
          tags: ${{ env.IMAGE_API }}:${{ github.sha }},${{ env.IMAGE_API }}:latest

      - name: Build & push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/MAPS.Web/Dockerfile
          push: true
          tags: ${{ env.IMAGE_WEB }}:${{ github.sha }},${{ env.IMAGE_WEB }}:latest

  # ─── HELM DEPLOY (only on main, after images built) ──────────────────────
