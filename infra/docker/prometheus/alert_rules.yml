groups:
  - name: maps_alerts
    rules:

      # API down
      - alert: MapsApiDown
        expr: up{job="maps-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "MAPS API is down"
          description: "The MAPS API container has been unreachable for more than 1 minute."

      # High error rate
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High API error rate"
          description: "More than 10% of API requests are returning 5xx errors."

      # PostgreSQL down
      - alert: PostgresDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is down"
          description: "The PostgreSQL database container is unreachable."

      # High memory usage
      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes{job="maps-api"} > 1073741824
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on MAPS API"
          description: "MAPS API is using more than 1GB of memory."
